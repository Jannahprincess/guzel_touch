<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guzel Touch</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
position:relative;
color:white;

background:url("bg.png.jpeg");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:absolute;
inset:0;
background:url("stars.png");
background-size:cover;
background-position:center;
opacity:0.25;
z-index:0;
}

.card{
width:92%;
max-width:360px;
padding:20px;
border-radius:22px;
text-align:center;
position:relative;
z-index:2;

background:rgba(0,0,0,0.35);
backdrop-filter: blur(8px);

box-shadow:0 0 25px rgba(180,220,255,0.15);

opacity:0;
transform:scale(0.85) translateY(20px);
animation:enter 0.6s ease forwards;
}

@keyframes enter{
to{
opacity:1;
transform:scale(1) translateY(0);
}
}

.card::before{
content:"";
position:absolute;
inset:0;
border-radius:22px;
background:rgba(0,0,0,0.25);
z-index:0;
}

.card > *{
position:relative;
z-index:1;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 15px rgba(255,255,255,0.6);
margin-bottom:10px;
}

/* ===== ITEMS (نيون أبيض/أزرق فاتح) ===== */
.item{
display:flex;
align-items:center;
gap:12px;
margin:10px 0;
padding:12px;
border-radius:14px;
cursor:pointer;

background:rgba(255,255,255,0.06);

box-shadow:
0 0 6px rgba(200,230,255,0.15),
0 0 14px rgba(180,220,255,0.10);

transition:0.25s;
}

.item:hover{
transform:scale(1.03);
box-shadow:
0 0 10px rgba(220,240,255,0.45),
0 0 22px rgba(180,220,255,0.30),
0 0 35px rgba(255,255,255,0.18);
}

.item i{
font-size:20px;
color:#dff2ff;
}

@media(max-width:480px){
.card{width:88%;padding:16px;}
.logo{width:80px;height:80px;}
.item{padding:10px;font-size:14px;}
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png.jpeg" class="logo" alt="logo">

<h2>Guzel Touch</h2>

<div class="item" onclick="window.open('https://www.facebook.com/groups/33985829011033038/?ref=share&mibextid=NSMWBT','_blank')">
<i class="fab fa-facebook"></i>
<span>Facebook</span>
</div>

<div class="item" onclick="window.open('https://www.instagram.com/guzel.touch?igsh=cXdheXF3cWdxd3Jt','_blank')">
<i class="fab fa-instagram"></i>
<span>Instagram</span>
</div>

<div class="item" onclick="window.open('https://www.tiktok.com/@guzel_touch?_r=1&_t=ZS-93zNr4ZDxsD','_blank')">
<i class="fab fa-tiktok"></i>
<span>TikTok</span>
</div>

<div class="item" onclick="window.open('https://whatsapp.com/channel/0029VbCb9GD0QeaoYu6Tfr2P','_blank')">
<i class="fab fa-whatsapp"></i>
<span>WhatsApp</span>
</div>

</div>

</body>
</html>
